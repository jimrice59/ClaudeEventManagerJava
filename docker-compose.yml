services:
  postgres:
    image: postgres:16-alpine
    container_name: eventmanager-postgres
    environment:
      POSTGRES_DB: eventdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eventmanager-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  cassandra:
    image: cassandra:4.1
    container_name: eventmanager-cassandra
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    environment:
      CASSANDRA_CLUSTER_NAME: EventManagerCluster
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  cassandra-init:
    image: cassandra:4.1
    depends_on:
      cassandra:
        condition: service_healthy
    command: >
      cqlsh cassandra -e
      "CREATE KEYSPACE IF NOT EXISTS event_manager
       WITH replication = {'class':'SimpleStrategy','replication_factor':1}
       AND durable_writes = true;"
    restart: "no"

  traefik:
    image: traefik:v3.0
    container_name: eventmanager-traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "9000:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  app:
    image: event-manager:latest
    container_name: eventmanager-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_NAME: eventdb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      CASSANDRA_HOST: cassandra
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.event-manager.rule=Host(`localhost`)"
      - "traefik.http.routers.event-manager.entrypoints=web"
      - "traefik.http.services.event-manager.loadbalancer.server.port=8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully

  prometheus:
    image: prom/prometheus:latest
    container_name: eventmanager-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: eventmanager-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  cassandra_data:
  grafana_data:
