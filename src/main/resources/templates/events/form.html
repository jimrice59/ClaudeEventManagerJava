<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title th:text="${eventId != null} ? 'Edit Event' : 'New Event'">Event Form</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container" style="max-width:720px">
  <div class="mb-3">
    <a th:href="@{/ui/events}" class="text-decoration-none">&larr; All Events</a>
  </div>
  <h2 th:text="${eventId != null} ? 'Edit Event' : 'New Event'"></h2>

  <form th:action="${eventId != null} ? @{/ui/events/{id}/edit(id=${eventId})} : @{/ui/events}"
        th:object="${event}" method="post" class="mt-3">

    <div class="mb-3">
      <label for="name" class="form-label">Name <span class="text-danger">*</span></label>
      <input id="name" type="text" th:field="*{name}"
             class="form-control" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
      <div class="invalid-feedback" th:errors="*{name}"></div>
    </div>

    <div class="mb-3">
      <label for="description" class="form-label">Description</label>
      <textarea id="description" th:field="*{description}" class="form-control" rows="3"></textarea>
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label for="eventDate" class="form-label">Date &amp; Time <span class="text-danger">*</span></label>
        <input id="eventDate" type="datetime-local" th:field="*{eventDate}"
               class="form-control" th:classappend="${#fields.hasErrors('eventDate')} ? 'is-invalid'">
        <div class="invalid-feedback" th:errors="*{eventDate}"></div>
      </div>
      <div class="col-md-3 mb-3">
        <label for="ticketPrice" class="form-label">Ticket Price <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text">$</span>
          <input id="ticketPrice" type="number" step="0.01" min="0" max="10000" th:field="*{ticketPrice}"
                 class="form-control" th:classappend="${#fields.hasErrors('ticketPrice')} ? 'is-invalid'">
          <div class="invalid-feedback" th:errors="*{ticketPrice}"></div>
        </div>
      </div>
      <div class="col-md-3 mb-3">
        <label for="ticketsAvailable" class="form-label">Tickets Available <span class="text-danger">*</span></label>
        <input id="ticketsAvailable" type="number" min="0" th:field="*{ticketsAvailable}"
               class="form-control" th:classappend="${#fields.hasErrors('ticketsAvailable')} ? 'is-invalid'">
        <div class="invalid-feedback" th:errors="*{ticketsAvailable}"></div>
      </div>
    </div>

    <div class="mb-3">
      <label for="venueId" class="form-label">Venue <span class="text-danger">*</span></label>
      <select id="venueId" th:field="*{venueId}"
              class="form-select" th:classappend="${#fields.hasErrors('venueId')} ? 'is-invalid'">
        <option value="">— select a venue —</option>
        <option th:each="v : ${venues}" th:value="${v.id}" th:text="${v.name + ' (' + v.city + ')'}"></option>
      </select>
      <div class="invalid-feedback" th:errors="*{venueId}"></div>
    </div>

    <div class="mb-4">
      <label class="form-label">Performers</label>
      <div class="row row-cols-2 row-cols-md-3 g-2">
        <div class="col" th:each="p : ${allPerformers}">
          <div class="form-check">
            <input class="form-check-input" type="checkbox"
                   th:field="*{performerIds}" th:value="${p.id}" th:id="'p-' + ${p.id}">
            <label class="form-check-label" th:for="'p-' + ${p.id}" th:text="${p.name}"></label>
          </div>
        </div>
      </div>
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary" th:text="${eventId != null} ? 'Update Event' : 'Create Event'"></button>
      <a th:href="@{/ui/events}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
