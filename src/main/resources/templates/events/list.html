<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>Events – Event Manager</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Events</h2>
    <a sec:authorize="isAuthenticated()" th:href="@{/ui/events/new}" class="btn btn-primary">+ New Event</a>
  </div>

  <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

  <div th:if="${#lists.isEmpty(events)}" class="text-muted">No events found.</div>

  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" th:unless="${#lists.isEmpty(events)}">
    <div class="col" th:each="event : ${events}">
      <div class="card h-100 shadow-sm">
        <div class="card-body">
          <h5 class="card-title" th:text="${event.name}"></h5>
          <p class="card-text text-muted small" th:text="${#temporals.format(event.eventDate, 'MMM d, yyyy h:mm a')}"></p>
          <p class="card-text" th:text="${event.venue?.name}"></p>
          <p class="card-text">
            <span class="badge bg-success" th:text="'$' + ${event.ticketPrice}"></span>
            <span class="badge bg-secondary ms-1" th:text="${event.ticketsAvailable} + ' tickets'"></span>
          </p>
        </div>
        <div class="card-footer d-flex gap-2">
          <a th:href="@{/ui/events/{id}(id=${event.id})}" class="btn btn-sm btn-outline-primary">View</a>
          <a sec:authorize="isAuthenticated()" th:href="@{/ui/events/{id}/edit(id=${event.id})}" class="btn btn-sm btn-outline-secondary">Edit</a>
          <form sec:authorize="hasRole('ADMIN')" th:action="@{/ui/events/{id}/delete(id=${event.id})}" method="post"
                onsubmit="return confirm('Delete this event?')">
            <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
