<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${performer.id != null} ? 'Edit Performer' : 'New Performer'">Performer Form</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container" style="max-width:560px">
  <div class="mb-3">
    <a th:href="@{/ui/performers}" class="text-decoration-none">&larr; All Performers</a>
  </div>
  <h2 th:text="${performer.id != null} ? 'Edit Performer' : 'New Performer'"></h2>

  <form th:action="${performer.id != null} ? @{/ui/performers/{id}/edit(id=${performer.id})} : @{/ui/performers}"
        th:object="${performer}" method="post" class="mt-3">

    <div class="mb-3">
      <label for="name" class="form-label">Name <span class="text-danger">*</span></label>
      <input id="name" type="text" th:field="*{name}"
             class="form-control" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
      <div class="invalid-feedback" th:errors="*{name}"></div>
    </div>

    <div class="mb-3">
      <label for="genre" class="form-label">Genre</label>
      <input id="genre" type="text" th:field="*{genre}" class="form-control">
    </div>

    <div class="mb-4">
      <label for="bio" class="form-label">Bio</label>
      <textarea id="bio" th:field="*{bio}" class="form-control" rows="4"></textarea>
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary"
              th:text="${performer.id != null} ? 'Update Performer' : 'Create Performer'"></button>
      <a th:href="@{/ui/performers}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
