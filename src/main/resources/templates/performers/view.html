<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title th:text="${performer.name} + ' – Event Manager'">Performer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container">
  <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
  <div class="mb-3">
    <a th:href="@{/ui/performers}" class="text-decoration-none">&larr; All Performers</a>
  </div>

  <div class="row g-4">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-body">
          <h2 class="card-title" th:text="${performer.name}"></h2>
          <p class="text-muted" th:text="${performer.genre}"></p>
          <p th:if="${performer.bio}" th:text="${performer.bio}"></p>
        </div>
        <div class="card-footer d-flex gap-2">
          <a sec:authorize="hasRole('ADMIN')" th:href="@{/ui/performers/{id}/edit(id=${performer.id})}" class="btn btn-secondary">Edit</a>
          <form sec:authorize="hasRole('ADMIN')" th:action="@{/ui/performers/{id}/delete(id=${performer.id})}" method="post"
                onsubmit="return confirm('Delete this performer?')">
            <button type="submit" class="btn btn-danger">Delete</button>
          </form>
        </div>
      </div>
    </div>

    <div class="col-md-6" sec:authorize="hasRole('ADMIN')">
      <div class="card shadow-sm">
        <div class="card-header">Video URLs</div>
        <div class="card-body">
          <ul class="list-group list-group-flush mb-3" th:if="${not #sets.isEmpty(performer.videoUrls)}">
            <li class="list-group-item d-flex justify-content-between align-items-center"
                th:each="url : ${performer.videoUrls}">
              <a th:href="${url}" th:text="${url}" target="_blank" class="text-truncate me-2"
                 style="max-width:260px"></a>
              <form th:action="@{/ui/performers/{id}/videos/delete(id=${performer.id})}" method="post" class="d-inline">
                <input type="hidden" name="url" th:value="${url}">
                <button type="submit" class="btn btn-sm btn-outline-danger">Remove</button>
              </form>
            </li>
          </ul>
          <p th:if="${#sets.isEmpty(performer.videoUrls)}" class="text-muted small">No videos yet.</p>

          <form th:action="@{/ui/performers/{id}/videos/add(id=${performer.id})}" method="post" class="d-flex gap-2">
            <input type="url" name="url" class="form-control" placeholder="https://..." required>
            <button type="submit" class="btn btn-outline-primary text-nowrap">Add Video</button>
          </form>
        </div>
      </div>
    </div>

    <div class="col-md-6" sec:authorize="!hasRole('ADMIN')">
      <div class="card shadow-sm" th:if="${not #sets.isEmpty(performer.videoUrls)}">
        <div class="card-header">Videos</div>
        <ul class="list-group list-group-flush">
          <li class="list-group-item" th:each="url : ${performer.videoUrls}">
            <a th:href="${url}" th:text="${url}" target="_blank"></a>
          </li>
        </ul>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
