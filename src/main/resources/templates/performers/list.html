<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>Performers – Event Manager</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Performers</h2>
    <a sec:authorize="hasRole('ADMIN')" th:href="@{/ui/performers/new}" class="btn btn-primary">+ New Performer</a>
  </div>

  <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

  <form th:action="@{/ui/performers}" method="get" class="mb-4 d-flex gap-2">
    <input type="text" name="name" class="form-control" style="max-width:200px"
           placeholder="Search by name" th:value="${nameFilter}">
    <input type="text" name="genre" class="form-control" style="max-width:200px"
           placeholder="Filter by genre" th:value="${genreFilter}">
    <button type="submit" class="btn btn-outline-secondary">Search</button>
    <a th:href="@{/ui/performers}" class="btn btn-outline-secondary">Clear</a>
  </form>

  <div th:if="${#lists.isEmpty(performers)}" class="text-muted">No performers found.</div>

  <div class="row row-cols-1 row-cols-md-3 g-3" th:unless="${#lists.isEmpty(performers)}">
    <div class="col" th:each="p : ${performers}">
      <div class="card h-100 shadow-sm">
        <div class="card-body">
          <h5 class="card-title"><a th:href="@{/ui/performers/{id}(id=${p.id})}" th:text="${p.name}" class="text-decoration-none"></a></h5>
          <p class="card-text text-muted small" th:text="${p.genre}"></p>
          <p class="card-text small" th:if="${p.bio}" th:text="${#strings.abbreviate(p.bio, 100)}"></p>
        </div>
        <div class="card-footer d-flex gap-2">
          <a th:href="@{/ui/performers/{id}/edit(id=${p.id})}" sec:authorize="hasRole('ADMIN')"
             class="btn btn-sm btn-outline-secondary">Edit</a>
          <form sec:authorize="hasRole('ADMIN')" th:action="@{/ui/performers/{id}/delete(id=${p.id})}" method="post"
                class="d-inline" onsubmit="return confirm('Delete this performer?')">
            <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
