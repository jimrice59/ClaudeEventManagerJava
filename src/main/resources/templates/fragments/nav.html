<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="nav" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold" th:href="@{/ui/events}">Event Manager</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/ui/events}">Events</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/ui/venues}">Venues</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/ui/performers}">Performers</a>
        </li>
      </ul>
      <ul class="navbar-nav">
        <li class="nav-item" sec:authorize="isAuthenticated()">
          <span class="navbar-text me-3 text-light">
            <i class="bi bi-person-circle"></i> <span sec:authentication="name"></span>
          </span>
        </li>
        <li class="nav-item" sec:authorize="isAuthenticated()">
          <form th:action="@{/ui/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
          </form>
        </li>
        <li class="nav-item" sec:authorize="!isAuthenticated()">
          <a class="btn btn-outline-light btn-sm" th:href="@{/ui/login}">Login</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
</body>
</html>
