<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>Venues – Event Manager</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Venues</h2>
    <a sec:authorize="hasRole('ADMIN')" th:href="@{/ui/venues/new}" class="btn btn-primary">+ New Venue</a>
  </div>

  <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

  <form th:action="@{/ui/venues}" method="get" class="mb-4 d-flex gap-2">
    <input type="text" name="city" class="form-control" style="max-width:220px"
           placeholder="Filter by city" th:value="${cityFilter}">
    <button type="submit" class="btn btn-outline-secondary">Filter</button>
    <a th:href="@{/ui/venues}" class="btn btn-outline-secondary">Clear</a>
  </form>

  <div th:if="${#lists.isEmpty(venues)}" class="text-muted">No venues found.</div>

  <table th:unless="${#lists.isEmpty(venues)}" class="table table-hover align-middle">
    <thead class="table-light">
      <tr>
        <th>Name</th><th>City</th><th>State</th><th>Capacity</th><th></th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="v : ${venues}">
        <td><a th:href="@{/ui/venues/{id}(id=${v.id})}" th:text="${v.name}"></a></td>
        <td th:text="${v.city}"></td>
        <td th:text="${v.state}"></td>
        <td th:text="${v.capacity}"></td>
        <td class="text-end">
          <a th:href="@{/ui/venues/{id}/edit(id=${v.id})}" sec:authorize="hasRole('ADMIN')"
             class="btn btn-sm btn-outline-secondary me-1">Edit</a>
          <form sec:authorize="hasRole('ADMIN')" th:action="@{/ui/venues/{id}/delete(id=${v.id})}" method="post"
                class="d-inline" onsubmit="return confirm('Delete this venue?')">
            <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
          </form>
        </td>
      </tr>
    </tbody>
  </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
