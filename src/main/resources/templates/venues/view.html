<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title th:text="${venue.name} + ' – Event Manager'">Venue</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container">
  <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
  <div class="mb-3">
    <a th:href="@{/ui/venues}" class="text-decoration-none">&larr; All Venues</a>
  </div>

  <div class="card shadow-sm" style="max-width:560px">
    <div class="card-body">
      <h2 class="card-title" th:text="${venue.name}"></h2>
      <dl class="row mt-3">
        <dt class="col-sm-4">Address</dt>
        <dd class="col-sm-8" th:text="${venue.address}"></dd>
        <dt class="col-sm-4">City</dt>
        <dd class="col-sm-8" th:text="${venue.city}"></dd>
        <dt class="col-sm-4">State</dt>
        <dd class="col-sm-8" th:text="${venue.state}"></dd>
        <dt class="col-sm-4">Zip</dt>
        <dd class="col-sm-8" th:text="${venue.zipCode}"></dd>
        <dt class="col-sm-4">Capacity</dt>
        <dd class="col-sm-8" th:text="${venue.capacity}"></dd>
      </dl>
    </div>
    <div class="card-footer d-flex gap-2">
      <a sec:authorize="hasRole('ADMIN')" th:href="@{/ui/venues/{id}/edit(id=${venue.id})}" class="btn btn-secondary">Edit</a>
      <form sec:authorize="hasRole('ADMIN')" th:action="@{/ui/venues/{id}/delete(id=${venue.id})}" method="post"
            onsubmit="return confirm('Delete this venue?')">
        <button type="submit" class="btn btn-danger">Delete</button>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
