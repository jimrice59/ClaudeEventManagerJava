<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${venue.id != null} ? 'Edit Venue' : 'New Venue'">Venue Form</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container" style="max-width:560px">
  <div class="mb-3">
    <a th:href="@{/ui/venues}" class="text-decoration-none">&larr; All Venues</a>
  </div>
  <h2 th:text="${venue.id != null} ? 'Edit Venue' : 'New Venue'"></h2>

  <form th:action="${venue.id != null} ? @{/ui/venues/{id}/edit(id=${venue.id})} : @{/ui/venues}"
        th:object="${venue}" method="post" class="mt-3">

    <div class="mb-3">
      <label for="name" class="form-label">Name <span class="text-danger">*</span></label>
      <input id="name" type="text" th:field="*{name}"
             class="form-control" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
      <div class="invalid-feedback" th:errors="*{name}"></div>
    </div>

    <div class="mb-3">
      <label for="address" class="form-label">Address <span class="text-danger">*</span></label>
      <input id="address" type="text" th:field="*{address}"
             class="form-control" th:classappend="${#fields.hasErrors('address')} ? 'is-invalid'">
      <div class="invalid-feedback" th:errors="*{address}"></div>
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label for="city" class="form-label">City <span class="text-danger">*</span></label>
        <input id="city" type="text" th:field="*{city}"
               class="form-control" th:classappend="${#fields.hasErrors('city')} ? 'is-invalid'">
        <div class="invalid-feedback" th:errors="*{city}"></div>
      </div>
      <div class="col-md-3 mb-3">
        <label for="state" class="form-label">State <span class="text-danger">*</span></label>
        <input id="state" type="text" th:field="*{state}" maxlength="2"
               class="form-control" th:classappend="${#fields.hasErrors('state')} ? 'is-invalid'">
        <div class="invalid-feedback" th:errors="*{state}"></div>
      </div>
      <div class="col-md-3 mb-3">
        <label for="zipCode" class="form-label">Zip Code</label>
        <input id="zipCode" type="text" th:field="*{zipCode}" class="form-control">
      </div>
    </div>

    <div class="mb-4">
      <label for="capacity" class="form-label">Capacity</label>
      <input id="capacity" type="number" min="1" th:field="*{capacity}"
             class="form-control" th:classappend="${#fields.hasErrors('capacity')} ? 'is-invalid'">
      <div class="invalid-feedback" th:errors="*{capacity}"></div>
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary" th:text="${venue.id != null} ? 'Update Venue' : 'Create Venue'"></button>
      <a th:href="@{/ui/venues}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
