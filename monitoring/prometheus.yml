global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'event-manager'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'app:8080'                    # full stack via docker compose up
          - 'host.docker.internal:8080'   # app running via mvn spring-boot:run
